site_name: HumemDB
site_url: https://docs.humem.ai/humemdb/
site_description: HumemDB documentation for SQL, Cypher, and exact and ANN vector search over embedded engines
site_author: humemai
repo_url: https://github.com/humemai/humemdb
repo_name: humemai/humemdb
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2026 humemai

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: teal
      accent: lime
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: lime
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.path
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil

plugins:
  - search
  - macros

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/humemai/humemdb
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/humemdb/
  version:
    provider: mike
  version_tag: !ENV [MIKE_VERSION_TAG, main]

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
  - Examples:
      - Overview: examples/index.md
      - 01 - SQL Basics: examples/01_sql_basics.md
      - 02 - Cypher Social Graph: examples/02_cypher_social_graph.md
      - 03 - Vector Search: examples/03_vector_search.md
  - Guide:
      - Query Surfaces: guide/query-surfaces.md
      - Routing: guide/routing.md
      - Transactions: guide/transactions.md
      - Vectors: guide/vectors.md
      - Benchmarks: guide/benchmarks.md
  - Development:
      - Documentation: development/documentation.md
      - Licensing: development/licensing.md
      - Release Workflow: development/release.md